services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oqjf
      POSTGRES_PASSWORD: oqjf
      POSTGRES_DB: oqjf
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oqjf']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
